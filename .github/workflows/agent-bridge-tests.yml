name: Agent Bridge Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install PyYAML

      - name: Run agent-bridge tests
        run: python -m unittest discover tools/agent-bridge/tests

      - name: Validate milestones
        run: |
          python tools/agent-bridge/agent_bridge.py validate M1 --json
          python tools/agent-bridge/agent_bridge.py validate M2 --json
          python tools/agent-bridge/agent_bridge.py validate M3 --json
